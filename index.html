<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolemaster — Création de Personnage</title>
  <meta name="description" content="Générateur de personnages Rolemaster — PWA basée sur CPR093">
  <meta name="theme-color" content="#0a0806">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/rolemaster-ui-additions.css">
  <link rel="stylesheet" href="css/compendium.css">
  <link rel="stylesheet" href="css/party.css">
  <link rel="stylesheet" href="css/bestiary.css">
  <link rel="stylesheet" href="css/merchants.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body class="rm-theme">

  <!-- Torches (desktop only) -->
  <div class="rm-torch rm-torch-left" aria-hidden="true"></div>
  <div class="rm-torch rm-torch-right" aria-hidden="true"></div>

  <!-- Header banner -->
  <header class="rm-header" id="rm-header-banner" style="cursor:pointer" title="Accueil">
    <div class="rm-lang-toggle">
      <button class="rm-flag active" id="btn-lang-fr" data-lang="fr">
        <img src="assets/ui/flags/flag_fr.webp" alt="FR" width="32">
      </button>
      <button class="rm-flag" id="btn-lang-en" data-lang="en">
        <img src="assets/ui/flags/flag_en.webp" alt="EN" width="32">
      </button>
      <button id="btn-reset-session"
        style="font-size:0.62rem;padding:2px 7px;background:rgba(185,28,28,0.15);
               color:#fca5a5;border:1px solid rgba(185,28,28,0.3);border-radius:4px;
               cursor:pointer;font-family:inherit;margin-left:4px"
        title="Réinitialiser la session de jeu (équipe, PNJs, combat, logs)">
        &#8634; Session
      </button>
    </div>
  </header>

  <!-- Hero video (Sora) — lazy-loaded, shown only on home view -->
  <div class="rm-hero-video" id="hero-video-container" style="display:none">
    <video muted loop playsinline preload="none"
      poster="assets/hero-poster.webp"
      id="hero-video"
      onerror="this.parentElement.style.display='none'"
      oncanplay="this.parentElement.style.display='';this.play()">
      <!-- WebM VP9 preferred (smaller), MP4 H.264 fallback -->
      <source data-src="assets/hero-sora.webm" type="video/webm">
      <source data-src="assets/hero-sora.mp4" type="video/mp4">
    </video>
    <div class="rm-hero-overlay">
      <h1 class="rm-hero-title">Rolemaster Reborn</h1>
    </div>
  </div>

  <!-- Main layout -->
  <div class="rm-layout">
    <!-- Tab navigation -->
    <nav class="rm-nav" id="main-nav">
      <!-- Generated by JS -->
    </nav>

    <!-- Central content with parchment frame -->
    <main class="rm-main">
      <div class="rm-frame">
        <div class="rm-parchment" id="app-main">
          <!-- Dynamic content rendered here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="rm-footer">
    <div class="rm-footer-actions" id="app-footer-actions">
      <!-- Generated by JS -->
    </div>
    <div class="rm-footer-deco">
      <div class="rm-footer-icon" title="Équipe"><img src="assets/ui/decorations/footer/footer_sword_shield.webp" alt="Équipe" id="footer-party"></div>
      <div class="rm-footer-icon" title="Bestiaire"><img src="assets/ui/decorations/footer/footer_scroll.webp" alt="Bestiaire" id="footer-bestiary"></div>
      <div class="rm-footer-icon" title="Marchands &amp; Trésor"><img src="assets/ui/decorations/footer/footer_scales_purse.webp" alt="Marchands" id="footer-merchants"></div>
      <div class="rm-footer-icon" title="Herbes &amp; Poisons"><img src="assets/ui/decorations/footer/footer_herbs_mortar.webp" alt="Herbes" id="footer-herbs"></div>
      <div class="rm-footer-icon" title="Outils de session"><img src="assets/ui/decorations/footer/footer_dice_coins.webp" alt="Outils" id="footer-toolbox"></div>
      <div class="rm-footer-icon" title="Grimoire des sorts"><img src="assets/ui/decorations/footer/footer_book_quill.webp" alt="Grimoire" id="footer-compendium"></div>
      <div class="rm-footer-icon" title="Rencontres"><img src="assets/ui/decorations/footer/footer_encounter.webp" alt="Rencontres" id="footer-encounters"></div>
      <div class="rm-footer-icon" title="Accueil / Home">
        <div id="footer-home">🏠</div>
      </div>
    </div>
    <div class="text-center text-xs" style="color:#d4c5a9;opacity:0.8;line-height:1.6;text-shadow:0 1px 2px rgba(0,0,0,0.5)">
      Rolemaster Character Generator — Based on CPR093 by Eric Lestrade (1997)<br>
      &copy; 2025-2026 Quentin PARISOT — PC-Conseil-Toulouse
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
