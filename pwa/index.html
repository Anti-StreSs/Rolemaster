<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolemaster — Création de Personnage</title>
  <meta name="description" content="Générateur de personnages Rolemaster — PWA basée sur CPR093">
  <meta name="theme-color" content="#0a0806">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/rolemaster-ui-additions.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body class="rm-theme">

  <!-- Torches (desktop only) -->
  <div class="rm-torch rm-torch-left" aria-hidden="true"></div>
  <div class="rm-torch rm-torch-right" aria-hidden="true"></div>

  <!-- Header banner -->
  <header class="rm-header" id="rm-header-banner" style="cursor:pointer" title="Accueil">
    <div class="rm-lang-toggle">
      <button class="rm-flag active" id="btn-lang-fr" data-lang="fr">
        <img src="assets/ui/flags/flag_fr.webp" alt="FR" width="32">
      </button>
      <button class="rm-flag" id="btn-lang-en" data-lang="en">
        <img src="assets/ui/flags/flag_en.webp" alt="EN" width="32">
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="rm-layout">
    <!-- Tab navigation -->
    <nav class="rm-nav" id="main-nav">
      <!-- Generated by JS -->
    </nav>

    <!-- Central content with parchment frame -->
    <main class="rm-main">
      <div class="rm-frame">
        <div class="rm-parchment" id="app-main">
          <!-- Dynamic content rendered here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="rm-footer">
    <div class="rm-footer-actions" id="app-footer-actions">
      <!-- Generated by JS -->
    </div>
    <div class="rm-footer-deco" aria-hidden="true">
      <img src="assets/ui/decorations/footer/footer_sword_shield.webp" alt="" width="96">
      <img src="assets/ui/decorations/footer/footer_scroll.webp" alt="" width="96">
      <img src="assets/ui/decorations/footer/footer_dice_coins.webp" alt="" width="96">
      <img src="assets/ui/decorations/footer/footer_book_quill.webp" alt="" width="96">
    </div>
    <div class="text-center text-xs" style="color:#d4c5a9;opacity:0.8;line-height:1.6;text-shadow:0 1px 2px rgba(0,0,0,0.5)">
      Rolemaster Character Generator — Based on CPR093 by Eric Lestrade (1997)<br>
      &copy; 2025 Quentin PARISOT — PC-Conseil-Toulouse
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
