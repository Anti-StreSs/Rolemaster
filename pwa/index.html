<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolemaster — Création de Personnage</title>
  <meta name="description" content="Générateur de personnages Rolemaster (RMSS) — PWA basée sur CPR093">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header id="app-header" class="bg-gray-800 border-b border-amber-900 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-amber-400 tracking-wide">
        <span class="text-amber-600">⚔</span> Rolemaster
      </h1>
      <div class="flex items-center gap-3">
        <button id="btn-lang" class="text-sm px-2 py-1 border border-amber-700 rounded hover:bg-amber-900 transition" title="Changer la langue">
          FR/EN
        </button>
        <button id="btn-menu" class="text-sm px-2 py-1 border border-gray-600 rounded hover:bg-gray-700 transition lg:hidden">
          ☰
        </button>
      </div>
    </div>
  </header>

  <nav id="app-nav" class="bg-gray-800 border-b border-gray-700 hidden lg:block">
    <div class="max-w-6xl mx-auto px-4 py-2 flex gap-4 text-sm">
      <a href="#home" class="nav-link text-amber-400 hover:text-amber-300" data-view="home">Accueil</a>
      <a href="#create" class="nav-link text-gray-400 hover:text-amber-300" data-view="create">Nouveau Personnage</a>
      <a href="#load" class="nav-link text-gray-400 hover:text-amber-300" data-view="load">Charger</a>
    </div>
  </nav>

  <main id="app-main" class="max-w-6xl mx-auto px-4 py-6">
    <!-- Dynamic content rendered here -->
  </main>

  <footer class="text-center text-xs text-gray-600 py-4 border-t border-gray-800">
    Rolemaster Character Generator — Based on CPR093 by Eric Lestrade (1997)
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
